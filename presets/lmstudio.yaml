# LM Studio (local server) preset for local-engine-router
# =========================================================
# Engine type: api_swap
# LM Studio manages its own server process; the router does NOT launch it.
# Start LM Studio and enable its local server in the GUI first.
# The router controls VRAM by calling LM Studio's HTTP load/unload endpoints.
#
# Gotcha: use the NATIVE /api/v1 endpoints (LM Studio 0.4.0+) for load/unload,
# NOT the OpenAI-compat /v1 (which only JIT-loads and never unloads) and NOT
# /api/v0 (which has no load/unload).  Note the field asymmetry: LOAD takes
# {"model": ...} while UNLOAD takes {"instance_id": ...}.  The server must
# already be running (start it with `lms server start` or headless mode); the
# HTTP API cannot start the server.  Readiness is a bare 200 on GET
# /api/v1/models (returns 200 even with no model loaded).  The exact loaded-
# state list shape can vary by LM Studio version; verify loaded_models_key /
# loaded_name_key against your `GET /api/v1/models` output if swap-skip
# detection misbehaves (worst case the router just reloads, which is harmless).

engines:
  lmstudio:
    type: api_swap
    enabled: true
    base_url: http://127.0.0.1:1234
    health_path: /api/v1/models     # bare 200 = server up (native v1 API)
    load_path: /api/v1/models/load  # POST to load a model before serving
    load_method: POST
    load_body:
      model: "{model}"              # LOAD identifier field is "model"
    load_timeout_s: 180
    unload_path: /api/v1/models/unload
    unload_method: POST
    unload_body:
      instance_id: "{model}"        # UNLOAD identifier field is "instance_id" (not "model")
    unload_timeout_s: 60
    loaded_path: /api/v1/models     # lists models (each with a loaded_instances array)
    loaded_models_key: data         # the JSON array key
    loaded_name_key: id             # model id field (used for routing match)
    tags_cache_ttl_s: 30
    # control_headers:              # LM Studio does not require auth by default;
    #   Authorization: "Bearer <LMS_API_KEY>"  # set if you enabled a token in settings

models:
  - id: <MODEL_ID>                  # must match what clients send (the display name or id
                                    # LM Studio reports in /v1/models)
    engine: lmstudio
    display_name: <DISPLAY_NAME>
    context_length: 8192
