# ramalama preset for local-engine-router
# =========================================
# Engine type: generic_process
# ramalama wraps llama.cpp with OCI/container tooling but exposes the same
# llama-server HTTP API.  The router launches it as a child process and kills
# it on swap-away.  Use `ramalama serve` to expose the OpenAI-compatible API.
#
# Gotcha: ramalama may pull model weights from an OCI registry on first use;
# raise start_timeout_s if network downloads are expected.  `serve` runs in the
# foreground by default (omit -d/--detach so the router owns the process; there
# is no --detach=false form).  Readiness is a bare HTTP 200 on /health; do not
# hardcode the body, since the underlying runtime (llama.cpp/vLLM/MLX) varies.

engines:
  ramalama:
    type: generic_process
    enabled: true
    base_url: http://127.0.0.1:8080
    start_cmd:
      - ramalama
      - serve
      - --port
      - "8080"                      # pin the port; omitting it auto-selects 8080-8180
      - --host
      - "127.0.0.1"                 # omitting --host binds all interfaces
      - <MODEL_REF>                 # e.g. ollama://qwen2.5:7b or oci://registry/model:tag
      # Optional flags:
      # - --gpu
      # - "cuda"                    # or "metal", "vulkan", "rocm"
      # - --context-size
      # - "8192"
    env: {}
    # cwd: /opt/ramalama
    ready_path: /health
    ready_check: ""                 # bare 200 = ready (body shape varies by runtime)
    start_timeout_s: 600            # first-run may pull the model from a registry
    stop_signal: SIGTERM
    stop_timeout_s: 30
    process_pattern: ramalama
    log_file: ./logs/ramalama.log

models:
  - id: <MODEL_ID>                  # must match what clients send
    engine: ramalama
    display_name: <DISPLAY_NAME>
    context_length: 8192
