# KoboldCpp preset for local-engine-router
# ==========================================
# Engine type: generic_process
# The router launches koboldcpp as a child process and kills it on swap-away.
# KoboldCpp exposes an OpenAI-compatible /v1/ API on the same port as its
# native API; use that base_url for router traffic.
#
# Gotcha: KoboldCpp uses its own CLI flags (--model, --gpulayers, --port).
# Omitting --host binds all interfaces, so pin --host 127.0.0.1 for a local
# router.  Readiness is a bare HTTP 200 on /api/extra/version (always present,
# unauthenticated); KoboldCpp has no HTTP load/unload, so the router owns the
# process and restarts it to change models.

engines:
  koboldcpp:
    type: generic_process
    enabled: true
    base_url: http://127.0.0.1:5001
    start_cmd:
      - <PATH_TO_KOBOLDCPP>         # e.g. /usr/local/bin/koboldcpp or python3 koboldcpp.py
      - --model
      - <PATH_TO_MODEL_GGUF>        # e.g. /models/mistral-7b-q4_k_m.gguf
      - --port
      - "5001"
      - --host
      - "127.0.0.1"
      - --gpulayers
      - "99"                        # GPU layers; set 0 for CPU-only
      # Optional flags:
      # - --contextsize
      # - "8192"
      # - --blasbatchsize
      # - "512"
    env: {}
    # cwd: /opt/koboldcpp
    ready_path: /api/extra/version  # always-present capabilities endpoint; bare 200 = up
    ready_check: ""                 # a 200 is the readiness signal (do not assert the body)
    start_timeout_s: 300
    stop_signal: SIGTERM
    stop_timeout_s: 30
    process_pattern: koboldcpp
    log_file: ./logs/koboldcpp.log

models:
  - id: <MODEL_ID>                  # must match what clients send
    engine: koboldcpp
    display_name: <DISPLAY_NAME>
    context_length: 8192
