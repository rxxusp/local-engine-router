# local-engine-router — example configuration
# ---------------------------------------------------------------------------
# Copy this to config.yaml and edit for your machine:
#     cp config.example.yaml config.yaml
# Routing is by the request's `model` field; only one heavy engine holds the
# GPU at a time, so the router swaps engines on demand.

# --- Bind address ----------------------------------------------------------
# Default is localhost-only (safe). Set to 0.0.0.0 ONLY if you must reach the
# router off-localhost (e.g. from a Docker container via the bridge gateway).
# If you do, set `api_keys` below or ensure a host firewall restricts access.
host: 127.0.0.1
port: 8077

# --- Authentication --------------------------------------------------------
# If non-empty, every request except GET /health must present a key via
#   Authorization: Bearer <key>     or     X-API-Key: <key>
# Leave empty for no auth (only safe on a localhost bind).
api_keys: []
# api_keys:
#   - "change-me-to-a-long-random-string"

log_level: INFO
log_file: ./logs/router.log
state_file: ./state.json

# SSE keep-alive comments keep streaming clients alive during a (possibly slow)
# engine swap so they don't hit an idle/first-token timeout.
swap_keepalive_enabled: true
swap_keepalive_interval_s: 5.0

# Wait this long for in-flight requests to finish before stopping an engine.
drain_timeout_s: 30.0
upstream_connect_timeout_s: 15.0

# Destructive Ollama management endpoints (/api/delete, /api/create, /api/copy,
# /api/push, /api/blobs) are refused through the router's /api/* passthrough by
# default — anyone who can reach the router could otherwise delete or overwrite
# local models, even when api_keys is unset. Set true only if you trust every
# client that can reach the port.
allow_destructive_ollama_api: false
# After freeing one engine, wait for the kernel to reclaim its (unified) memory
# before starting the next — ends as soon as free memory plateaus, capped here.
swap_memory_settle_timeout_s: 25.0

# --- Engines ---------------------------------------------------------------
# The `engines:` table is the recommended, general form: add any backend with
# config only (no Python). Each entry is `engine_key -> { type, ... }` where
# `type` is one of: generic_process, api_swap, ollama (and `ds4`, an advanced
# escape hatch documented at the bottom of this file). Models below reference
# these keys via `engine:`. See presets/ for ready-to-edit blocks per backend.
engines:
  # A local server the router launches and supervises (llama.cpp/llama-server,
  # vLLM, SGLang, KoboldCpp, MLX, ...). Required: base_url + start_cmd.
  llamacpp:
    type: generic_process
    enabled: true
    base_url: http://127.0.0.1:8080
    start_cmd:                       # argv list (no shell) or a single string
      - /usr/local/bin/llama-server
      - -m
      - /models/qwen2.5-7b-instruct-q4_k_m.gguf
      - --port
      - "8080"
    # env: { CUDA_VISIBLE_DEVICES: "0" }   # extra env (merged over os.environ)
    # cwd: /opt/llama.cpp                  # working dir (optional)
    ready_path: /health                    # polled for HTTP 200 until ready
    start_timeout_s: 300                   # vLLM/SGLang can take minutes
    stop_signal: SIGTERM                   # whole process GROUP, SIGTERM->SIGKILL + port-close check
    stop_timeout_s: 30
    # process_pattern: llama-server        # pgrep -f to reap forked workers/strays
    # log_file: ./logs/llamacpp.log
    # ready_check: "status==ok"            # richer than HTTP 200; "key==value" or "model:<id>".
    #                                      # vLLM: set ready_path=/v1/models + ready_check="model:<id>"
    #                                      # (vLLM /health is 200 with an EMPTY body before the model serves)

  # Ollama, managed by unloading its models (keep_alive:0) on swap-away.
  ollama:
    type: ollama
    enabled: true
    base_url: http://127.0.0.1:11434
    health_path: /api/tags
    unload_timeout_s: 60.0
    tags_cache_ttl_s: 30.0
    # systemd_unit: ollama.service         # best-effort start if unreachable

  # An engine whose models load/unload over HTTP (the router owns no process),
  # e.g. TabbyAPI or LM Studio. See presets/tabbyapi.yaml and presets/lmstudio.yaml.
  # tabby:
  #   type: api_swap
  #   enabled: true
  #   base_url: http://127.0.0.1:5000
  #   health_path: /v1/model                 # readiness probe (loads nothing)
  #   unload_path: /v1/model/unload          # called to release the GPU
  #   unload_method: POST
  #   loaded_path: /v1/model                 # lists loaded models, to confirm unload
  #   loaded_models_key: data                # JSON key holding the list
  #   loaded_name_key: id                    # per-entry key holding the model name
  #   unload_timeout_s: 60
  #   # load_path: /v1/model/load            # explicit-load engines (TabbyAPI, etc.)
  #   # load_method: POST
  #   # load_body: { model_name: "{model}" } # {model} substituted with the requested id
  #   # control_headers: { x-admin-key: "SECRET" }   # auth on control/load/unload calls only

# Static model->engine registry. The `id` must match what clients send, and
# `engine` must name a configured engine above. Unknown ids fall back to a live
# Ollama tag lookup.
models:
  - id: qwen2.5-7b-instruct
    engine: llamacpp
    display_name: Qwen2.5 7B Instruct
    context_length: 8192
  - id: llama3.1:8b
    engine: ollama
    display_name: Llama 3.1 8B
    context_length: 131072

# Optional alias map: { alias -> real model id }. A request for an alias is
# routed to the real model AND the outgoing body's "model" is rewritten to the
# real id, so OpenAI/Anthropic clients that send a fixed name (Claude Code,
# SDK defaults) reach a local model. An alias must not shadow a real model id
# and must point at a real id (no alias->alias chains).
# aliases:
#   gpt-4o-mini: qwen2.5-7b-instruct
#   claude-3-5-sonnet: llama3.1:8b

# --- Advanced: the `ds4` escape hatch --------------------------------------
# `ds4` drives a model through a `systemctl --user` unit (Restart=always)
# instead of a router-launched process. You almost certainly want
# `generic_process` or `api_swap` above. It exists for servers the router must
# manage via systemd. To use it, add an entry like this under `engines:`:
#   myds4:
#     type: ds4
#     enabled: true
#     base_url: http://127.0.0.1:8099
#     control: systemd-user        # or "process" (launch serve_script + SIGTERM)
#     systemd_user_unit: my.service
#     health_path: /v1/models
#     start_timeout_s: 240.0
#     stop_timeout_s: 45.0
#     # serve_script: /path/to/serve.sh   # used only when control: process
#
# (The legacy top-level `ds4:` and `ollama:` sections are still accepted for
# back-compat, but `engines:` is preferred and, when present, is the sole source
# of engines.)
