# local-engine-router — example configuration
# ---------------------------------------------------------------------------
# Copy this to config.yaml and edit for your machine:
#     cp config.example.yaml config.yaml
# Routing is by the request's `model` field; only one heavy engine holds the
# GPU at a time, so the router swaps engines on demand.

# --- Bind address ----------------------------------------------------------
# Default is localhost-only (safe). Set to 0.0.0.0 ONLY if you must reach the
# router off-localhost (e.g. from a Docker container via the bridge gateway).
# If you do, set `api_keys` below or ensure a host firewall restricts access.
host: 127.0.0.1
port: 8077

# --- Authentication --------------------------------------------------------
# If non-empty, every request except GET /health must present a key via
#   Authorization: Bearer <key>     or     X-API-Key: <key>
# Leave empty for no auth (only safe on a localhost bind).
api_keys: []
# api_keys:
#   - "change-me-to-a-long-random-string"

log_level: INFO
log_file: ./logs/router.log
state_file: ./state.json

# SSE keep-alive comments keep streaming clients alive during a (possibly slow)
# engine swap so they don't hit an idle/first-token timeout.
swap_keepalive_enabled: true
swap_keepalive_interval_s: 5.0

# Wait this long for in-flight requests to finish before stopping an engine.
drain_timeout_s: 30.0
upstream_connect_timeout_s: 15.0
# After freeing one engine, wait for the kernel to reclaim its (unified) memory
# before starting the next — ends as soon as free memory plateaus, capped here.
swap_memory_settle_timeout_s: 25.0

# --- Engines ---------------------------------------------------------------
# `ds4` here is an example of a bespoke server managed by a systemctl --user
# unit. `ollama` is managed by unloading its models (keep_alive:0).
ds4:
  enabled: true
  base_url: http://127.0.0.1:8099
  control: systemd-user          # or "process" (launch serve_script + SIGTERM)
  systemd_user_unit: ds4.service
  process_pattern: ds4/ds4-server
  health_path: /v1/models
  start_timeout_s: 240.0
  stop_timeout_s: 45.0
  serve_script: /path/to/ds4/serve.sh   # used only when control: process

ollama:
  enabled: true
  base_url: http://127.0.0.1:11434
  health_path: /api/tags
  unload_timeout_s: 60.0
  systemd_unit: ollama.service
  tags_cache_ttl_s: 30.0

# --- Generic engine table (alternative to the ds4:/ollama: sections above) --
# OPTIONAL. The two `ds4:`/`ollama:` sections above are the legacy, always-
# available form. To add *new* engines with config only (no Python), use this
# top-level `engines:` table instead. IMPORTANT: when `engines:` is present it
# is the SOLE source of engines and the `ds4:`/`ollama:` sections above are
# IGNORED — so the block below is commented out by default. Each entry is
# `engine_key -> { type, ... }`; `type` is one of: ds4, ollama,
# generic_process, api_swap. Models then reference these keys via `engine:`.
#
# engines:
#   # A local server the router launches + supervises (llama.cpp/llama-server,
#   # llamafile, vLLM, SGLang, Aphrodite). Required: base_url + start_cmd.
#   llamacpp:
#     type: generic_process
#     enabled: true
#     base_url: http://127.0.0.1:8080
#     start_cmd:                       # argv list (no shell) or a single string
#       - /usr/local/bin/llama-server
#       - -m
#       - /models/qwen2.5-7b-instruct-q4_k_m.gguf
#       - --port
#       - "8080"
#     # env: { CUDA_VISIBLE_DEVICES: "0" }   # extra env (merged over os.environ)
#     # cwd: /opt/llama.cpp                  # working dir (optional)
#     ready_path: /health                    # polled for HTTP 200 until ready
#     start_timeout_s: 300                   # vLLM/SGLang can take minutes
#     stop_signal: SIGTERM                   # SIGTERM->SIGKILL + port-close check
#     stop_timeout_s: 30
#     # process_pattern: llama-server        # pgrep -f to reap strays we don't own
#     # log_file: ./logs/llamacpp.log
#
#   # An engine whose models load/unload over HTTP (router owns no process),
#   # e.g. TabbyAPI. Required: base_url. unload_path frees VRAM on swap-away.
#   tabby:
#     type: api_swap
#     enabled: true
#     base_url: http://127.0.0.1:5000
#     health_path: /v1/model                 # readiness probe (loads nothing)
#     unload_path: /v1/model/unload          # called to release the GPU
#     unload_method: POST
#     # unload_body: {}                       # {model} in any string is substituted
#     loaded_path: /v1/model                 # lists loaded models, to confirm unload
#     loaded_models_key: data                # JSON key holding the list
#     loaded_name_key: id                    # per-entry key holding the model name
#     unload_timeout_s: 60
#     # systemd_unit: tabbyapi.service        # best-effort start if unreachable
#     tags_cache_ttl_s: 30
#
# models:
#   - id: qwen2.5-7b-instruct
#     engine: llamacpp
#   - id: my-tabby-model
#     engine: tabby

# Static model->engine registry. The `id` must match what clients send, and
# `engine` must name a configured engine (ds4/ollama here, or a key from the
# `engines:` table above). Unknown ids fall back to a live Ollama tag lookup.
models:
  - id: deepseek-v4-flash
    engine: ds4
    display_name: DeepSeek V4 Flash
    context_length: 131072
  - id: qwen3.6-uncensored:27b
    engine: ollama
    display_name: Qwen3.6 Uncensored 27B
    context_length: 262144
