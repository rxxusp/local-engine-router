# Build the container image and publish it to the GitHub Container Registry
# (ghcr.io/<owner>/local-engine-router) on version tags (v*) and on releases.
#
# The image is pure-Python (no CUDA) — see the Dockerfile header. Auth uses the
# automatically-provided GITHUB_TOKEN; no extra secrets are required.
name: docker-publish

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/local-engine-router, lower-cased to satisfy registry rules.
  IMAGE_NAME: ${{ github.repository_owner }}/local-engine-router

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Derive semver tags from the git tag/release. `latest` is applied to
          # every non-prerelease build (a v* tag isn't a branch, so the usual
          # is_default_branch guard would never fire here).
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
