# Build the container image and publish it to the GitHub Container Registry
# (ghcr.io/<owner>/local-engine-router) on version tags (v*) and on releases.
#
# The image is pure-Python (no CUDA) — see the Dockerfile header. Auth uses the
# automatically-provided GITHUB_TOKEN; no extra secrets are required.
name: docker-publish

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/local-engine-router, lower-cased to satisfy registry rules.
  IMAGE_NAME: ${{ github.repository_owner }}/local-engine-router

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # On tag pushes: assert that the git tag (v1.2.3 -> 1.2.3) matches both
      # pyproject.toml [project].version and router/__init__.__version__.
      # Fails the release early if they diverge, before any image is pushed.
      - name: Assert tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TOML_VER="$(python3 - <<'EOF'
          import tomllib, pathlib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )"
          INIT_VER="$(python3 -c "import ast, pathlib; src=pathlib.Path('router/__init__.py').read_text(); [print(ast.literal_eval(n.value)) for n in ast.walk(ast.parse(src)) if isinstance(n, ast.Assign) and any(isinstance(t, ast.Name) and t.id=='__version__' for t in n.targets)]")"
          echo "tag=$TAG  pyproject=$TOML_VER  __version__=$INIT_VER"
          if [ "$TAG" != "$TOML_VER" ]; then
            echo "ERROR: git tag $TAG does not match pyproject.toml version $TOML_VER" >&2
            exit 1
          fi
          if [ -n "$INIT_VER" ] && [ "$TAG" != "$INIT_VER" ]; then
            echo "ERROR: git tag $TAG does not match router/__version__ $INIT_VER" >&2
            exit 1
          fi
          echo "Version check passed: $TAG"

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Derive semver tags from the git tag/release. `latest` is applied to
          # every non-prerelease build (a v* tag isn't a branch, so the usual
          # is_default_branch guard would never fire here).
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
