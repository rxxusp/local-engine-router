name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: tests (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # Prefer the package's own [dev] extra (pulls fastapi, uvicorn[standard],
          # httpx, pyyaml from dependencies + pytest, pytest-asyncio from dev).
          if [ -f pyproject.toml ]; then
            pip install ".[dev]"
          else
            pip install fastapi "uvicorn[standard]" httpx pyyaml pytest pytest-asyncio
          fi

      - name: Run test suite
        run: python3 -m pytest -q
